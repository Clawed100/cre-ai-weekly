<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Page Not Found — CRE + AI Weekly</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --bg-1: #111113;
      --text: #e4e4e7;
      --text-2: #a1a1aa;
      --text-3: #71717a;
      --border: #27272a;
      --green: #22c55e;
      --green-dim: rgba(34,197,94,.1);
      --cyan: #06b6d4;
      --red: #ef4444;
      --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      --sans: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .status-code {
      font-family: var(--mono);
      font-size: 5rem;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -0.04em;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    p {
      font-size: 1.05rem;
      color: var(--text-2);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s ease;
      font-family: var(--sans);
      letter-spacing: -0.01em;
    }

    .btn-green {
      background: var(--green);
      color: #000;
    }

    .btn-green:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--text-3);
      background: var(--bg-1);
    }

    .cta-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 600px) {
      .status-code {
        font-size: 3.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      p {
        font-size: 1rem;
      }

      .cta-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="status-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist. It might have been moved or deleted.</p>

  <div class="cta-group">
    <a href="/" class="btn btn-green">Back to Home</a>
    <a href="/#subscribe" class="btn btn-outline">Subscribe</a>
  </div>
</div>

</body>
</html>
