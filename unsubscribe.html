<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribed &mdash; CRE + AI Weekly</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%23000'/><text x='50' y='68' font-family='system-ui' font-size='48' font-weight='700' fill='%23fff' text-anchor='middle'>SS</text></svg>" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', -apple-system, system-ui, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #111111;
      border: 1px solid #262626;
      border-radius: 16px;
      padding: 56px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      animation: slideUp .5s cubic-bezier(.16,1,.3,1);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .icon-wrap {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: popIn .4s .2s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
    .icon-wrap svg {
      width: 32px; height: 32px;
    }
    .badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      background: #262626; color: #a3a3a3;
      padding: 3px 14px;
      border-radius: 4px;
      font-size: .6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.8rem; font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 10px;
    }
    p {
      color: #a3a3a3; font-size: .9rem;
      line-height: 1.65; margin-bottom: 8px;
    }
    .note {
      font-size: .8rem;
      color: #525252;
      margin-top: 16px;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      width: 100%; padding: 14px 28px;
      border-radius: 8px; border: none;
      font-size: .9rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      text-decoration: none;
      transition: all .2s ease;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #262626;
      color: #f5f5f5;
    }
    .btn-outline:hover {
      border-color: #404040;
      background: rgba(255,255,255,.04);
      transform: translateY(-1px);
    }
    #canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .card { position: relative; z-index: 2; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="card">
  <div class="icon-wrap">
    <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
    </svg>
  </div>
  <span class="badge">Unsubscribed</span>
  <h1>You're all set.</h1>
  <p>You've been removed from CRE + AI Weekly. You won't receive any more emails from us.</p>
  <p class="note">Changed your mind? You can always re-subscribe from our homepage.</p>
  <a href="/" class="btn btn-outline">
    Back to CRE + AI Weekly &rarr;
  </a>
</div>

<script>
  // ── CANVAS MOUSE TRAIL ──
  (function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.running = true;
    ctx.frame = 1;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const E = { friction: 0.5, trails: 60, size: 50, dampening: 0.025, tension: 0.99 };
    const pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let lines = [];
    let phase = Math.random() * Math.PI * 2;
    let hue = 285;

    function Node() { this.x = 0; this.y = 0; this.vx = 0; this.vy = 0; }

    function Line(spring) {
      this.spring = spring + 0.1 * Math.random() - 0.05;
      this.friction = E.friction + 0.01 * Math.random() - 0.005;
      this.nodes = [];
      for (let i = 0; i < E.size; i++) {
        const n = new Node();
        n.x = pos.x; n.y = pos.y;
        this.nodes.push(n);
      }
    }
    Line.prototype.update = function() {
      let s = this.spring, t = this.nodes[0];
      t.vx += (pos.x - t.x) * s;
      t.vy += (pos.y - t.y) * s;
      for (let i = 0; i < this.nodes.length; i++) {
        t = this.nodes[i];
        if (i > 0) {
          const prev = this.nodes[i - 1];
          t.vx += (prev.x - t.x) * s;
          t.vy += (prev.y - t.y) * s;
          t.vx += prev.vx * E.dampening;
          t.vy += prev.vy * E.dampening;
        }
        t.vx *= this.friction; t.vy *= this.friction;
        t.x += t.vx; t.y += t.vy;
        s *= E.tension;
      }
    };
    Line.prototype.draw = function() {
      let x = this.nodes[0].x, y = this.nodes[0].y;
      ctx.beginPath(); ctx.moveTo(x, y);
      for (let i = 1; i < this.nodes.length - 2; i++) {
        const e = this.nodes[i], t = this.nodes[i + 1];
        x = 0.5 * (e.x + t.x); y = 0.5 * (e.y + t.y);
        ctx.quadraticCurveTo(e.x, e.y, x, y);
      }
      const e = this.nodes[this.nodes.length - 2], t = this.nodes[this.nodes.length - 1];
      ctx.quadraticCurveTo(e.x, e.y, t.x, t.y);
      ctx.stroke(); ctx.closePath();
    };

    function initLines() {
      lines = [];
      for (let i = 0; i < E.trails; i++) {
        lines.push(new Line(0.45 + (i / E.trails) * 0.025));
      }
    }

    let started = false;
    function onMove(e) {
      if (e.touches) { pos.x = e.touches[0].pageX; pos.y = e.touches[0].pageY; }
      else { pos.x = e.clientX; pos.y = e.clientY; }
      if (!started) { initLines(); started = true; }
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('touchstart', function(e) {
      if (e.touches.length === 1) { pos.x = e.touches[0].pageX; pos.y = e.touches[0].pageY; }
      if (!started) { initLines(); started = true; }
    }, { passive: true });

    function render() {
      if (!ctx.running) return;
      ctx.globalCompositeOperation = 'source-over';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'lighter';
      phase += 0.0015;
      hue = 285 + Math.sin(phase) * 85;
      ctx.strokeStyle = 'hsla(' + Math.round(hue) + ',100%,50%,0.025)';
      ctx.lineWidth = 10;
      for (let i = 0; i < lines.length; i++) {
        lines[i].update(); lines[i].draw();
      }
      ctx.frame++;
      requestAnimationFrame(render);
    }
    render();

    window.addEventListener('focus', () => { if (!ctx.running) { ctx.running = true; render(); } });
    window.addEventListener('blur', () => { ctx.running = true; });
  })();
</script>

</body>
</html>
