<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribed // CRE + AI Weekly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0b;
    color: #e4e4e7;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #111113;
    border: 1px solid #1e1e22;
    border-radius: 12px;
    padding: 48px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
    color: #22c55e;
  }
  p {
    color: #71717a;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .btn {
    display: inline-block;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }
  .btn-outline {
    border: 1px solid #1e1e22;
    color: #e4e4e7;
  }
  .btn-outline:hover { border-color: #71717a; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#x2713;</div>
  <h1>// unsubscribed</h1>
  <p>You've been removed from CRE + AI Weekly. You won't receive any more emails from us.</p>
  <p style="font-size:13px;">Changed your mind? You can always re-subscribe from our homepage.</p>
  <a href="/" class="btn btn-outline">Back to CRE + AI Weekly</a>
</div>
</body>
</html>
